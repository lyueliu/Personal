<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />

    <title>离线文件传输 · 二维码解析端</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #1a1a2e;
            background-image: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1.25rem;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 1.6rem;
            color: #fff;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #a0a0c0;
        }

        .mode-switch {
            display: flex;
            gap: .5rem;
            background: rgba(255,255,255,.05);
            border-radius: .75rem;
            padding: .375rem;
            margin-bottom: 1.25rem;
        }
        .mode-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .375rem;
            padding: .625rem;
            border: none;
            border-radius: .5rem;
            background: transparent;
            color: #8080a0;
            font-size: .8125rem;
            font-weight: 600;
            cursor: pointer;
        }
        .mode-btn.active {
            background: rgba(108,99,255,.25);
            color: #6c63ff;
        }

        .upload-section {
            display: none; /* 手机默认隐藏，PC可切 */
            margin-bottom: 1.25rem;
        }
        .upload-zone {
            background: rgba(255,255,255,.05);
            border: 2px dashed rgba(255,255,255,.2);
            border-radius: 1rem;
            padding: 2.5rem 1.25rem;
            text-align: center;
        }

        .camera-section {
            margin-bottom: 1.25rem;
        }
        .camera-viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        #cameraPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 70%; height: 60%;
            max-width: 20rem;
        }
        .scan-corner {
            position: absolute;
            width: 1.5rem; height: 1.5rem;
            border-color: #6c63ff;
            border-style: solid;
        }
        .scan-corner-tl { top:0;left:0;border-width:3px 0 0 3px;border-radius:.25rem 0 0 0; }
        .scan-corner-tr { top:0;right:0;border-width:3px 3px 0 0;border-radius:0 .25rem 0 0; }
        .scan-corner-bl { bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 .25rem; }
        .scan-corner-br { bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 .25rem 0; }

        .scan-line {
            position: absolute;
            top: 0; left: 5%;
            width: 90%; height: 2px;
            background: linear-gradient(90deg,transparent,#6c63ff,transparent);
            animation: scanMove 2s ease-in-out infinite;
        }
        @keyframes scanMove {
            0%,100%{ top:0; }
            50%{ top:calc(100% - 2px); }
        }

        .camera-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: .5rem;
            padding: 1rem;
            background: rgba(255,255,255,.05);
            border-radius: .75rem;
        }
        .capture-btn {
            width: 4rem; height: 4rem;
            border-radius: 50%;
            border: 3px solid #6c63ff;
            background: rgba(108,99,255,.15);
            color: #6c63ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .capture-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #505060;
        }
        .capture-btn.scanning {
            border-color: #ff5252;
            background: rgba(255,82,82,.15);
            color: #ff5252;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100%{ transform: scale(1); }
            50%{ transform: scale(1.08); }
        }

        .footer {
            text-align: center;
            font-size: .8125rem;
            color: #606080;
            margin-top: 1.5rem;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>

<body>
<div class="container">

    <header class="header">
        <h1>离线文件传输工具</h1>
        <p class="subtitle">二维码解析端 · 相机扫描</p>
    </header>

    <div class="mode-switch">
        <button class="mode-btn" id="uploadModeBtn">📁 上传文件夹</button>
        <button class="mode-btn active" id="cameraModeBtn">📷 拍照扫描</button>
    </div>

    <section class="upload-section" id="uploadSection">
        <div class="upload-zone">
            <p>（桌面端使用）选择包含二维码序列的文件夹</p>
        </div>
    </section>

    <section class="camera-section" id="cameraSection">
        <div class="camera-viewport">
            <video id="cameraPreview" autoplay playsinline muted></video>
            <canvas id="decodeCanvas" style="display:none;"></canvas>
            <div class="camera-overlay">
                <div class="scan-frame">
                    <div class="scan-corner scan-corner-tl"></div>
                    <div class="scan-corner scan-corner-tr"></div>
                    <div class="scan-corner scan-corner-bl"></div>
                    <div class="scan-corner scan-corner-br"></div>
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>

        <div class="camera-controls">
            <div class="camera-info">
                <span id="cameraStatusText">准备就绪</span>
                <span class="scan-progress" id="scanProgressText" style="display:none;"></span>
            </div>
            <button class="switch-camera-btn" id="switchCameraBtn" title="切换摄像头" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
            </button>
            <button class="capture-btn" id="captureBtn" title="开始扫描">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"/>
                </svg>
            </button>
            <button class="stop-btn" id="stopScanBtn" title="停止扫描" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                </svg>
            </button>
        </div>
    </section>

    <footer class="footer">
        <span id="footerStatus">准备就绪，点击"开始扫描"启用相机</span>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
